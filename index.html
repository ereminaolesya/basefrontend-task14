<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="autocomplete-wrapper">
    <label class="input-label" for="autocomplete">Search for a city</label>
    <div class="input-autocomplete">
        <input data-test-id="input-autocomplete" id="autocomplete" class="autocomplete" type="text" aria-expanded="false">
        <label class="placeholder" for="autocomplete">Type to search...</label>
    </div>
    <ul class="input-autocomplete-options-list" data-test-id="input-autocomplete-options-list">
    </ul>
</div>

<script src="script.js"></script>
</body>
</html>
